<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sydney Chien Assignment 4 Diggy World</title>

  <style>
    body {
      text-align: center;
      background-color: #eeeeee;
    }

    .canvas-wrap {
      position: relative;
      display: inline-block;
    }

    canvas {
      border: 1px solid black;
      display: block;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: white;
      box-shadow: 0 0 2px black;
    }

    #crosshair::before {
      left: 6px;
      top: 1px;
      width: 2px;
      height: 12px;
    }

    #crosshair::after {
      left: 1px;
      top: 6px;
      width: 12px;
      height: 2px;
    }

    .controls {
      margin-top: 12px;
    }
  </style>
</head>

<body onload="main()">

  <h2>Sydney Chien Assignment 4 Diggy World</h2>
  <p>sjchien@ucsc.edu</p>
  <p id="fps">FPS: -</p>
      <p>Diamonds found: <span id="diamond-counter">0 / 20</span>    <p id="dog-message"></p></p>


  <div class="canvas-wrap">
    <canvas id="webgl" width="600" height="600">
      Please use a browser that supports canvas.
    </canvas>
    <div id="crosshair"></div>
  </div>

  <div class="controls">
    <p>
        WASD to move, Space to jump over 1-block ledges, QE turn, F add sand, R dig sand
    </p>
 
  </div>

<script src="./lib/cuon-utils.js"></script>
<script src="./lib/cuon-matrix.js"></script>
<script src="camera.js"></script>
<script src="main.js"></script>

</body>
</html>
